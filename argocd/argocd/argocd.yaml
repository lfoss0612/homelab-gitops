# Argo CD managing its own Helm release. Deliberately manual sync (no
# syncPolicy.automated) - unlike other apps in this repo, a bad sync here
# could break Argo CD itself with nothing else around to fix it. Review
# the diff and sync by hand.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: system
  source:
    chart: argo-cd
    helm:
      valuesObject:
        applicationSet:
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
        configs:
          cm:
            url: https://argocd.fosshomelab.duckdns.org
            accounts.lfoss: login,apiKey
          params:
            server.insecure: true
          rbac:
            policy.csv: |
              g, lfoss, role:admin
            policy.default: role:readonly
        controller:
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
        global:
          cattle:
            clusterId: local
            clusterName: local
            rkePathPrefix: ""
            rkeWindowsPathPrefix: ""
            systemProjectId: p-vsnqf
            url: https://rancher.local
        repoServer:
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
        server:
          insecure: true
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
          service:
            type: LoadBalancer
    repoURL: https://argoproj.github.io/argo-helm
    targetRevision: 9.5.19
  ignoreDifferences:
    # argocd-secret holds Argo CD's own runtime-generated auth material
    # (admin/user password hashes, server.secretkey, TLS cert/key). The
    # chart renders this Secret empty and Argo CD populates it itself at
    # startup - syncing without this would wipe logins and rotate the
    # signing key.
    - group: ""
      kind: Secret
      name: argocd-secret
      jsonPointers:
        - /data
