apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-obsidian
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: mcp-servers
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/lfoss0612/homelab-gitops.git
    targetRevision: HEAD
    path: charts/mcp-server
    helm:
      releaseName: mcp-obsidian
      valueFiles:
        - values/obsidian.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
