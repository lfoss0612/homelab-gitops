# Serves Qwen3-8B on the RTX 5090 (one time-slicing replica) via the local
# charts/vllm wrapper chart. Model/tuning defaults live in the chart's
# values.yaml; litellm reaches it at http://vllm.vllm.svc.cluster.local:8000/v1.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vllm
  namespace: argocd
spec:
  destination:
    namespace: vllm
    server: https://kubernetes.default.svc
  project: ai
  source:
    repoURL: https://github.com/lfoss0612/homelab-gitops.git
    targetRevision: HEAD
    path: charts/vllm
    helm:
      releaseName: vllm
      parameters:
        # TEMPORARY: scaled to 0 because k8s-worker-2's 96G root disk cannot
        # hold the ~8 GiB compressed / ~25 GiB unpacked vllm-openai image
        # (node hits DiskPressure mid-pull). Remove this parameter after
        # growing the VM's scsi0 disk on pve-ai and expanding the LV.
        - name: replicaCount
          value: "0"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
