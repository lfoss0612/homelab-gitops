apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rancher-monitoring
  namespace: argocd
spec:
  destination:
    namespace: cattle-monitoring-system
    server: https://kubernetes.default.svc
  project: system
  source:
    chart: rancher-monitoring
    helm:
      parameters:
        - name: global.cattle.psp.enabled
          value: "false"
        - name: grafana.service.type
          value: LoadBalancer
        - name: grafana.service.loadBalancerIP
          value: 10.2.6.10
        - name: grafana.persistence.enabled
          value: "true"
        - name: grafana.persistence.type
          value: pvc
        - name: grafana.persistence.existingClaim
          value: grafana-dashboards
        - name: prometheus.prometheusSpec.retention
          value: 10d
        - name: prometheus.prometheusSpec.storageSpec.volumeClaimTemplate.spec.storageClassName
          value: longhorn
        - name: prometheus.prometheusSpec.storageSpec.volumeClaimTemplate.spec.resources.requests.storage
          value: 50Gi
        - name: grafana.grafana\.ini.server.root_url
          value: "https://grafana.home.lan/"
        - name: grafana.grafana\.ini.server.serve_from_sub_path
          value: "false"
        # Bypass the chart's nginx sidecar (targetPort 8080): it caches
        # responses (incl. auth state) for up to 1d without varying by
        # session cookie, which broke login/logout. Direct access only;
        # this also skips the sidecar's Rancher-embedded-iframe URL rewrite.
        - name: grafana.service.targetPort
          value: "3000"
        - name: global.cattle.clusterId
          value: local
      valuesObject:
        grafana:
          # Rancher's mirrored curl image (rancher/appco-curl) lacks sed,
          # which download_dashboards.sh needs for datasource rewriting.
          # Note: this chart fork joins registry+repository with no "/",
          # so leave registry empty and let Docker Hub be implicit.
          downloadDashboardsImage:
            registry: ""
            repository: curlimages/curl
            tag: 8.14.1
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: homelab
                  orgId: 1
                  folder: Homelab
                  type: file
                  disableDeletion: false
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/homelab
          dashboards:
            homelab:
              argocd:
                gnetId: 14584
                revision: 1
                datasource: Prometheus
              cert-manager:
                gnetId: 20842
                revision: 3
                datasource: Prometheus
              longhorn:
                gnetId: 16888
                revision: 14
                datasource: Prometheus
              metallb:
                gnetId: 14127
                revision: 1
                datasource: Prometheus
              nginx-ingress:
                gnetId: 9614
                revision: 1
                datasource: Prometheus
              nvidia-dcgm:
                gnetId: 12239
                revision: 2
                datasource: Prometheus
    repoURL: https://charts.rancher.io
    targetRevision: 109.0.2+up80.9.1-rancher.8
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
