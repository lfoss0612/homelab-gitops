# Sourced from grafana.com dashboard 12528, hand-patched:
# 1. Narrowed the "YB DB Cluster" job picker (label_values(job), no
#    filter/default) to yb-masters/yb-tservers, defaulted to yb-tservers.
# 2. Stripped every panel's hardcoded group="yb-master"/"yb-tserver"/
#    "ycql"/"yedis" label matcher. That label doesn't exist on our
#    exporter's metrics at all (this dashboard targets YugabyteDB's
#    single-job Docker demo, which synthesizes a "group" label to tell
#    master/tserver/ycql/yedis apart within one job; our Helm chart
#    already splits them into separate yb-masters/yb-tservers jobs via
#    their own ServiceMonitors, so job="$dbcluster" alone is sufficient).
# 3. Simplified the "Node Status" panel (was "Node Status - $node", a
#    repeat-per-node singlestat). Its hidden $node variable derives from
#    an instance-string regex extraction that assumes one physical node
#    per "instance" label; in our k8s scrape setup a single tserver pod
#    exposes 3 ports (core/ycql/yedis) as 3 separate instance values,
#    breaking that assumption. Now a static avg(up{job="$dbcluster"}).
# 4. Converted all legacy Angular panel types (105 "graph", 1
#    "singlestat", schemaVersion 25 from ~2018) to modern "timeseries"/
#    "stat" panels. Grafana 12 has fully dropped Angular support;
#    client-side migration of these types is normally automatic but
#    wasn't reliably rendering data here, so they're now hand-converted.
# NOTE: 6 of 7 sections (Master, Tablet Server, YEDIS, YCQL, YSQL,
# RocksDB) are COLLAPSED BY DEFAULT -- click a section header to expand
# it. Only "Node Status" renders open. This is very likely why the
# dashboard looked completely empty: only one (now-fixed) panel was
# visible without clicking into any section.
# Remaining empty panels within YEDIS Ops & Latency are genuinely
# empty, not broken: this cluster doesn't use the YEDIS API, so those
# counters never get emitted.
# See dcgm-exporter-servicemonitor.yaml in this directory for the sibling
# GPU dashboard fix (same root-cause class: a scrape gap, not a query gap).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-yugabytedb
  namespace: cattle-dashboards
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Homelab
    # Client-side apply mirrors the whole object into
    # kubectl.kubernetes.io/last-applied-configuration, which pushed total
    # annotation size past the 256KiB k8s cap for this ~234KB dashboard.
    # Server-side apply skips that annotation entirely.
    argocd.argoproj.io/sync-options: ServerSideApply=true
