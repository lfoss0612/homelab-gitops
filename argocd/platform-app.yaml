apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: platform
spec:
  project: default
  source:
    repoURL: https://github.com/lfoss0612/homelab-gitops.git
    targetRevision: HEAD
    # root app-of-apps: creates the per-namespace platform-<ns> app-of-apps
    # (and the AppProjects) from argocd/platform-apps/.
    path: argocd/platform-apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      # prune disabled: removing a manifest from git will not cascade-delete a
      # live app. Enable once confident.
      prune: false
      selfHeal: true
