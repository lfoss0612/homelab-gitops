apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pgadmin
  namespace: argocd
spec:
  destination:
    namespace: yugabytedb
    server: https://kubernetes.default.svc
  project: yugabyte
  source:
    chart: pgadmin4
    helm:
      parameters:
        - name: service.type
          value: LoadBalancer
    repoURL: https://helm.runix.net
    targetRevision: '*'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
