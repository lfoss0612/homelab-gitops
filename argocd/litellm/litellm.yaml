apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm
  namespace: argocd
spec:
  destination:
    namespace: litellm
    server: https://kubernetes.default.svc
  ignoreDifferences:
    - group: apps
      jsonPointers:
        - /spec/template/spec/dnsConfig
      kind: Deployment
      name: litellm
      namespace: litellm
  project: ai
  source:
    chart: litellm-helm
    helm:
      # Secrets are NOT inlined. They live as standalone Kubernetes Secrets in
      # the litellm namespace (created out of band, like the mcp-* servers):
      #   litellm-masterkey       (key: masterkey)               -> master key
      #   litellm-postgresql-ext  (password, postgres-password)  -> postgres auth
      #   litellm-dbcredentials   (username, password)           -> litellm DB login
      parameters:
        - name: ingress.hosts[0].host
          value: litellm.home.lan
        - name: ingress.hosts[0].paths[0].path
          value: /
        - name: ingress.hosts[0].paths[0].pathType
          value: ImplementationSpecific
        # Local vLLM server (argocd/vllm/, chart charts/vllm) serving Qwen3-8B.
        # "hosted_vllm/" routes through LiteLLM's vLLM provider; the suffix must
        # match vllm's --served-model-name.
        - name: proxy_config.model_list[0].model_name
          value: qwen3-8b
        - name: proxy_config.model_list[0].litellm_params.model
          value: hosted_vllm/qwen3-8b
        - name: proxy_config.model_list[0].litellm_params.api_base
          value: http://vllm.vllm.svc.cluster.local:8000/v1
        - name: proxy_config.general_settings.store_model_in_db
          value: "True"
        - name: proxy_config.litellm_settings.drop_params
          value: "True"  
        - name: masterkeySecretName
          value: litellm-masterkey
        - name: masterkeySecretKey
          value: masterkey
        - name: service.type
          value: LoadBalancer
        - name: postgresql.image.registry
          value: docker.io
        - name: postgresql.image.repository
          value: bitnami/postgresql
        - name: postgresql.image.tag
          value: latest
        - name: postgresql.auth.existingSecret
          value: litellm-postgresql-ext
    repoURL: ghcr.io/berriai
    targetRevision: 1.x.x
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
