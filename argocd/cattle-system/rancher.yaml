apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rancher
  namespace: argocd
spec:
  destination:
    namespace: cattle-system
    server: https://kubernetes.default.svc
  project: system
  source:
    chart: rancher
    helm:
      # Rancher 2.14's chart declares kubeVersion "< 1.36.0-0", which blocks
      # templating against this RKE2 1.36 cluster. Override the version Helm
      # sees so the chart renders. NOTE: running Rancher 2.14 on K8s 1.36 is
      # unsupported by SUSE until 2.15 GA / a 2.14.x+KDM backport adds 1.36.
      kubeVersion: "1.35.0"
      parameters:
        - name: ingress.ingressClassName
          value: nginx
        - name: replicas
          value: "1"
        - name: ingress.tls.source
          value: secret
        - name: ingress.tls.secretName
          value: home-lan-tls
        - name: hostname
          value: rancher.home.lan
        # Stop Rancher's own systemcharts controller from managing
        # system-upgrade-controller (chart + Plans) on the local cluster,
        # so Argo CD (argocd/cattle-system/system-upgrade-controller.yaml)
        # is the sole owner. Internal/undocumented flag - takes effect once
        # this Application is synced.
        - name: extraEnv[0].name
          value: CATTLE_FEATURES
        - name: extraEnv[0].value
          value: managed-system-upgrade-controller=false
    repoURL: https://releases.rancher.com/server-charts/latest
    targetRevision: 2.14.3
  # The chart injects CATTLE_BOOTSTRAP_PASSWORD into this Deployment via a
  # pre-install/pre-upgrade hook Secret (bootstrap-secret) read back with
  # Helm's `lookup`, which plain template rendering can never reproduce.
  # This env var will permanently diff from git; ignore it rather than
  # chase unfixable drift.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: rancher
      namespace: cattle-system
      jsonPointers:
        - /spec/template/spec/containers/0/env
