apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rancher-turtles
  namespace: argocd
spec:
  destination:
    namespace: cattle-turtles-system
    server: https://kubernetes.default.svc
  project: system
  source:
    chart: rancher-turtles
    helm:
      parameters:
        - name: global.cattle.systemDefaultRegistry
          value: ""
        - name: priorityClassName
          value: rancher-critical
        - name: features.no-cert-manager.enabled
          value: "true"
    repoURL: https://charts.rancher.io
    targetRevision: 109.0.3+up0.26.3
  ignoreDifferences:
    # RBAC-aggregated ClusterRole: rules are populated by the API
    # server's aggregation controller, not the chart, so this always
    # differs from the rendered manifest. Harmless, permanent diff.
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
      name: rancher-turtles-aggregated-manager-role
      jsonPointers:
        - /rules
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
