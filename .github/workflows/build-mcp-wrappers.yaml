name: Build MCP wrapper images

on:
  push:
    branches: [main]
    paths:
      - "dockerfiles/**"
      - ".github/workflows/build-mcp-wrappers.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server: [paypal, monday, argocd]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfiles/${{ matrix.server }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mcp-${{ matrix.server }}:latest
            ghcr.io/${{ github.repository_owner }}/mcp-${{ matrix.server }}:${{ github.sha }}
