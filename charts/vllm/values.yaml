# Default values for the vllm chart.

# Rancher project (cluster "local") this namespace should be grouped under
# in the Rancher UI. Same "ai" project as litellm/langflow/comfyui.
rancherProjectId: p-jgsqc

replicaCount: 1

image:
  repository: vllm/vllm-openai
  tag: v0.25.1
  pullPolicy: IfNotPresent

imagePullSecrets: []

serverPort: 8000

model:
  # HuggingFace model id to download and serve. FP8 halves the weights
  # (~16 GiB bf16 -> ~8.5 GiB) with native Blackwell hardware support, which
  # is what lets both the 0.45 budget and the 16k context below fit.
  name: Qwen/Qwen3-8B-FP8
  # Model id exposed on the OpenAI API (/v1/models); defaults to model.name.
  servedName: qwen3-8b
  # Fraction of GPU memory vLLM may claim. This is a hard budget against
  # *total* device memory, not "free" memory - vLLM does not defer to what
  # ollama/comfyui are concurrently using, so raising this risks a real CUDA
  # OOM when another workload's model is also loaded. Kept well below 1.0
  # because the RTX 5090 is time-sliced and shared (no memory isolation).
  # 0.45 x 32 GiB = ~14.5 GiB: ~8.5 GiB FP8 weights + overhead leaves ~4 GiB
  # KV cache, while growing ollama's working room to ~17 GiB.
  gpuMemoryUtilization: "0.45"
  maxModelLen: "16384"

# Extra CLI args appended to the vllm serve command.
extraArgs:
  - --reasoning-parser=qwen3

# Name of a pre-existing Secret (created out-of-band, not in git) with a
# HUGGING_FACE_HUB_TOKEN key. Only needed for gated models; Qwen is ungated.
existingSecret: ""

# Extra plain (non-secret) environment variables, standard k8s EnvVar format.
env: []

# PVC for the HuggingFace download cache (~16 GiB for Qwen3-8B).
cache:
  enabled: true
  size: 50Gi
  storageClassName: ""  # empty -> cluster default (longhorn)

# vLLM uses /dev/shm for tensor exchange; emptyDir sized here.
shmSize: 8Gi

service:
  type: ClusterIP
  port: 8000

resources:
  limits:
    nvidia.com/gpu: 1

runtimeClassName: nvidia

# Model load can take minutes on first start (download + weight load).
startupProbe:
  periodSeconds: 10
  failureThreshold: 180

nodeSelector: {}
tolerations: []
affinity: {}
