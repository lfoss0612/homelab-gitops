# monday MCP server
# npm wrapper image (dockerfiles/monday) bridging @mondaydotcomorg/monday-api-mcp
# to streamable HTTP via supergateway.

image:
  repository: ghcr.io/lfoss0612/mcp-monday
  tag: latest
  pullPolicy: Always

containerPort: 8080

# Create this Secret out-of-band before syncing, e.g.:
#   kubectl -n mcp create secret generic monday-mcp-env \
#     --from-literal=MONDAY_TOKEN=...
envFromSecrets:
  - monday-mcp-env

ingress:
  enabled: false
  className: nginx
  host: monday.mcp.homelab.local
  tls:
    enabled: false

# Wrapper images serve /healthz via supergateway.
probes:
  enabled: true
