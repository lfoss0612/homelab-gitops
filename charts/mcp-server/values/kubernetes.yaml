# kubernetes MCP server
# Kubernetes MCP server (stdio transport). Uses in-cluster service account
# credentials; grant RBAC to the mcp-kubernetes service account separately.

image:
  repository: mcp/kubernetes
  tag: latest
  pullPolicy: Always

# stdio-only server: no network endpoint; kept alive via stdin/tty.
stdio: true
containerPort: null

service:
  enabled: false

serviceAccount:
  create: true
  automountToken: true
