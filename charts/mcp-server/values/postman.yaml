# postman MCP server
# Postman MCP server (stdio transport).

image:
  repository: mcp/postman
  tag: latest
  pullPolicy: Always

# stdio-only server: no network endpoint; kept alive via stdin/tty.
stdio: true
containerPort: null

service:
  enabled: false

# Create this Secret out-of-band before syncing, e.g.:
#   kubectl -n mcp create secret generic postman-mcp-env \
#     --from-literal=POSTMAN_API_KEY=...
envFromSecrets:
  - postman-mcp-env
