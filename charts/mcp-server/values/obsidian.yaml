# obsidian MCP server
# Obsidian MCP server (stdio transport); talks to the Obsidian Local REST API plugin.

image:
  repository: mcp/obsidian
  tag: latest
  pullPolicy: Always

# stdio-only server: no network endpoint; kept alive via stdin/tty.
stdio: true
containerPort: null

service:
  enabled: false

# Create this Secret out-of-band before syncing, e.g.:
#   kubectl -n mcp create secret generic obsidian-mcp-env \
#     --from-literal=OBSIDIAN_API_KEY=... \
#     --from-literal=OBSIDIAN_HOST=...
envFromSecrets:
  - obsidian-mcp-env
